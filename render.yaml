services:
  - type: web
    name: deployiq-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://your-frontend.netlify.app"
    healthCheckPath: /health
    autoDeploy: true
